<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Rapid Acceleration Station</title>
    <link rel="stylesheet" href="index.css"/>
    <script defer src="appFunctions.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="navigationBar">
        <div class="titleBar">
          <button id="showHidenMenu" class="toggleButton"></button>
          <div class="title">
            Rapid Acceleration Station
          </div>
        </div>
        <div class="titleBarButtons">
          <button id="minimizeButton" class="navigationButton minimizeButton"></button>
          <button id="maximizeButton" class="navigationButton maximizeButton"></button>
          <button id="closeButton" class="navigationButton closeButton"></button>
        </div>
      </div>
    </header>
    <section class="sidebar"></section>
    <main class="main">
      <div class="card">
        <h1>Robot Information</h1>
        <p id="robot-state">Connection: Unknown</p>
        <p id="timer">Time Remaining: -1</p>
      </div>
      <div class="card">
        <h1>Camera</h1>
        <div id="camera"></div>
      </div>
      <div class="card">
        <h1>Faults Detected</h1>
        <p>Radio Connection: </p>
        <p>Robot Code: </p>
        <p>Shooter: </p>
        <p>Intake: </p>
        <p>Encoder: </p>
      </div>
      <div class="card">
        <h1>Auto Selector</h1>
        <p>Select an Autonomous Below</p>
        <select id="auto-selector">
          <option>No Autonomous Found</option>
        </select>
      </div>
      <div class="card">
        <h1>Ready for Match</h1>
      </div>
      <div class="card">
        <h1>Robot States</h1>
      </div>
      <div class="card"></div>
    </main>

    <script src="frc-web-components/frc-web-components.min.js"></script>
  </body>
</html>
